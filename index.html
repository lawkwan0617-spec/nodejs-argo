<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数字小天地</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background: #f7f9fc;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #0077cc;
            color: white;
            padding: 20px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        .random-box {
            background-color: white;
            border: 1px solid #ccc;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 18px;
        }
        button {
            padding: 12px 20px;
            font-size: 16px;
            cursor: pointer;
            border: none;
            background-color: #0077cc;
            color: white;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #005fa3;
        }
    </style>
</head>
<body>
    <header>
        <h1>数字小天地</h1>
    </header>
    <main>
        <div class="random-box" id="randomText">点击下面按钮生成一个数字</div>
        <button onclick="generateRandom()">生成数字</button>
    </main>

    <script>
        function generateRandom() {
            const randomNumber = Math.floor(Math.random() * 100) + 1; // 1-100
            document.getElementById('randomText').textContent = 
                `你生成的数字是: ${randomNumber}`;
        }
    </script>
</body>
</html>
