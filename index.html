<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>独一无二的网页</title>
  <style>
    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(120deg, #f0c27b, #4b1248);
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    /* 标题 */
    h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }

    /* 按钮 */
    .button {
      background: linear-gradient(45deg, #ff6a00, #ee0979);
      border: none;
      padding: 15px 30px;
      font-size: 1.2rem;
      color: #fff;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .button:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* 漂浮动画 */
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    /* 装饰圆点 */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      animation: move 10s linear infinite;
    }

    @keyframes move {
      0% { transform: translateY(100vh) scale(1); }
      100% { transform: translateY(-100vh) scale(0.5); }
    }
  </style>
</head>
<body>
  <h1>欢迎来到独一无二的网页</h1>
  <button class="button" onclick="alert('你点击了按钮！')">点击我</button>

  <!-- 随机装饰圆点 -->
  <script>
    for(let i=0; i<20; i++){
      const circle = document.createElement('div');
      circle.classList.add('circle');
      circle.style.width = circle.style.height = Math.random() * 50 + 20 + 'px';
      circle.style.left = Math.random() * 100 + 'vw';
      circle.style.animationDuration = Math.random() * 10 + 5 + 's';
      document.body.appendChild(circle);
    }
  </script>
</body>
</html>
